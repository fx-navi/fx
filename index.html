<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --buy-color: #3498db;
            --sell-color: #e74c3c;
            --bg-color: #f4f7f9;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg-color); padding: 20px; color: #333; }
        .calc-card { max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: auto; }
        
        /* 買い・売り切り替えスイッチ */
        .side-selector { display: flex; margin-bottom: 25px; background: #eee; border-radius: 10px; padding: 5px; }
        .side-btn { flex: 1; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1rem; }
        .side-btn.active.buy { background: var(--buy-color); color: white; }
        .side-btn.active.sell { background: var(--sell-color); color: white; }
        .side-btn:not(.active) { background: transparent; color: #777; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #666; font-weight: bold; }
        input, select { width: 100%; padding: 12px; box-sizing: border-box; border: 2px solid #edf2f7; border-radius: 10px; font-size: 1rem; }
        input:focus { border-color: #cbd5e0; outline: none; }
        
        /* 結果表示エリア */
        .result-container { background: #2d3748; color: white; padding: 20px; border-radius: 15px; transition: 0.3s; }
        .buy-mode { border-left: 8px solid var(--buy-color); }
        .sell-mode { border-left: 8px solid var(--sell-color); }
        
        .result-title { font-size: 0.8rem; color: #a0aec0; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .result-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .val-box { flex: 1; text-align: center; }
        .sl-text { color: #ff7675; }
        .tp-text { color: #55efc4; }
        .val-large { font-size: 1.6rem; font-weight: bold; display: block; }
        .val-small { font-size: 0.85rem; opacity: 0.8; }
        
        .footer-info { font-size: 0.75rem; border-top: 1px solid #4a5568; padding-top: 10px; margin-top: 10px; color: #cbd5e0; line-height: 1.6; }
        .warning { color: #ff7675; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="calc-card">
    <div class="side-selector">
        <button class="side-btn active buy" onclick="setSide('buy')">買い (Long)</button>
        <button class="side-btn sell" onclick="setSide('sell')">売り (Short)</button>
    </div>
    
    <div class="input-grid">
        <div class="input-group">
            <label>元手資金 (円)</label>
            <input type="number" id="capital" value="100000" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>エントリー価格</label>
            <input type="number" id="entry_price" value="150.00" step="0.01" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>取引数量 (通貨)</label>
            <input type="number" id="units" value="10000" step="100" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>リスクリワード比</label>
            <select id="rr_ratio" onchange="calculate()">
                <option value="1">1 : 1.0</option>
                <option value="1.5">1 : 1.5</option>
                <option value="2" selected>1 : 2.0</option>
                <option value="3">1 : 3.0</option>
            </select>
        </div>
        <div class="input-group" style="grid-column: span 2;">
            <label>レバレッジ (倍)</label>
            <input type="number" id="leverage" value="25" oninput="calculate()">
        </div>
    </div>

    <div id="result_area" class="result-container buy-mode">
        <div class="result-title">
            <span id="side_label">買いポジションの目安</span>
            <span>損失許容: 2%</span>
        </div>
        
        <div class="result-main">
            <div class="val-box">
                <span class="val-small">損切り価格 (SL)</span>
                <span class="val-large sl-text" id="sl_price">0.00</span>
                <span class="val-small" id="sl_pips">0 pips</span>
            </div>
            <div style="font-size: 1.2rem; color: #4a5568;">|</div>
            <div class="val-box">
                <span class="val-small">利確価格 (TP)</span>
                <span class="val-large tp-text" id="tp_price">0.00</span>
                <span class="val-small" id="tp_pips">0 pips</span>
            </div>
        </div>

        <div class="footer-info">
            許容損失額: <span id="risk_amount">0</span> 円 ／ 
            必要証拠金: <span id="margin_needed">0</span> 円
            <div id="margin_warning" class="warning">⚠️ 資金が足りません！</div>
        </div>
    </div>
</div>

<script>
    let currentSide = 'buy';

    function setSide(side) {
        currentSide = side;
        // ボタンの見た目切り替え
        document.querySelectorAll('.side-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.side-btn.${side}`).classList.add('active');
        
        // エリアの色とラベル切り替え
        const area = document.getElementById('result_area');
        if(side === 'buy') {
            area.classList.replace('sell-mode', 'buy-mode');
            document.getElementById('side_label').innerText = "買いポジションの目安";
        } else {
            area.classList.replace('buy-mode', 'sell-mode');
            document.getElementById('side_label').innerText = "売りポジションの目安";
        }
        calculate();
    }

    function calculate() {
        const capital = parseFloat(document.getElementById('capital').value) || 0;
        const entryPrice = parseFloat(document.getElementById('entry_price').value) || 0;
        const units = parseFloat(document.getElementById('units').value) || 0;
        const rrRatio = parseFloat(document.getElementById('rr_ratio').value) || 1;
        const leverage = parseFloat(document.getElementById('leverage').value) || 1;

        // 1. 2%の損失額
        const riskAmount = capital * 0.02;

        // 2. 損切り幅(pips)の計算 (1pips = 0.01円)
        let slPips = 0;
        if (units > 0) {
            slPips = riskAmount / (units * 0.01);
        }

        // 3. 価格計算 (買いと売りで方向を逆に)
        let slPrice, tpPips, tpPrice;
        
        if (currentSide === 'buy') {
            slPrice = entryPrice - (slPips * 0.01);
            tpPips = slPips * rrRatio;
            tpPrice = entryPrice + (tpPips * 0.01);
        } else {
            slPrice = entryPrice + (slPips * 0.01);
            tpPips = slPips * rrRatio;
            tpPrice = entryPrice - (tpPips * 0.01);
        }

        // 4. 必要証拠金
        const margin = (units * entryPrice) / leverage;

        // 表示反映
        document.getElementById('sl_price').innerText = slPrice.toFixed(3);
        document.getElementById('sl_pips').innerText = (currentSide === 'buy' ? "-" : "+") + slPips.toFixed(1) + " pips";
        document.getElementById('tp_price').innerText = tpPrice.toFixed(3);
        document.getElementById('tp_pips').innerText = (currentSide === 'buy' ? "+" : "-") + tpPips.toFixed(1) + " pips";
        document.getElementById('risk_amount').innerText = Math.floor(riskAmount).toLocaleString();
        document.getElementById('margin_needed').innerText = Math.round(margin).toLocaleString();

        // 資金不足アラート
        document.getElementById('margin_warning').style.display = (margin > capital) ? 'block' : 'none';
    }

    // 初期計算
    calculate();
</script>

</body>
</html>
